<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>建築節能與空調計算整合平台</title>
    <style>
        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background-color: #f4f7f6;
            overflow: hidden;
        }
        .sidebar {
            width: 260px;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            z-index: 20;
        }
        .sidebar h2 {
            text-align: center;
            padding: 20px 10px;
            margin: 0;
            background-color: #1a252f;
            font-size: 18px;
            letter-spacing: 1px;
        }
        .menu {
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
            overflow-y: auto;
        }
        .menu li {
            border-bottom: 1px solid #34495e;
        }
        .menu a {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            color: #bdc3c7;
            text-decoration: none;
            transition: 0.3s;
            cursor: pointer;
            font-size: 15px;
            line-height: 1.4;
        }
        .menu a:hover, .menu a.active {
            background-color: #34495e;
            color: white;
            border-left: 5px solid #3498db;
        }
        .content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            width: calc(100% - 260px);
        }
        .header {
            background-color: #fff;
            padding: 15px 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        .header h1 {
            margin: 0;
            font-size: 20px;
            color: #333;
        }
        .header-btn {
            padding: 8px 16px;
            background: #0078D7;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .header-btn:hover {
            background: #005a9e;
        }
        .iframe-container {
            flex-grow: 1;
            padding: 15px;
            background-color: #ecf0f1;
            display: flex;
        }
        
        /* 針對 iframe 增加顯示與隱藏的切換機制 */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: none; /* 預設將所有的 iframe 隱藏 */
        }
        iframe.active-frame {
            display: block; /* 只有被套用 active-frame 類別的才會顯示 */
        }
    </style>
</head>
<body>

    <!-- 左側導覽列 -->
    <div class="sidebar">
        <h2>綠建築與節能計算平台</h2>
        <ul class="menu">
            <li>
                <!-- 將預設的高亮 (active) 移至第一個選項 -->
                <a onclick="loadTool('r_value.html', this, '中央空調系統節能技術節能率 (R) 計算')" class="active">
                    ⚙️ 空調節能率 (R)
                </a>
            </li>
            <li>
                <a onclick="loadTool('eac.html', this, '綠建築空調節能效率 (EAC) 綜合計算')">
                    ❄️ 空調節能效率 (EAC)
                </a>
            </li>
            <li>
                <a onclick="loadTool('el.html', this, '照明節能指標 (EL) 檢討與計算')">
                    💡 照明節能指標 (EL)
                </a>
            </li>
            <li>
                <a onclick="loadTool('eberse.html', this, '建築能效評估計算工具 (E-BERSe)')">
                    🏢 建築能效 (E-BERSe)
                </a>
            </li>
            <li>
                <a onclick="loadTool('budget.html', this, '空調近零碳改造預算概估')">
                    💰 預算概估表 (VRF/冰水)
                </a>
            </li>
        </ul>
    </div>

    <!-- 右側內容區 -->
    <div class="content">
        <div class="header">
            <!-- 預設標題對應第一個檔案 -->
            <h1 id="current-title">中央空調系統節能技術節能率 (R) 計算</h1>
            <button class="header-btn" onclick="openInNewTab()">在新視窗獨立開啟 ↗</button>
        </div>
        <!-- 幫 container 加上 id 方便操作 -->
        <div class="iframe-container" id="iframe-container">
            <!-- 預設載入第一個檔案，並設定其為顯示狀態 (active-frame) -->
            <iframe id="frame-r_value" src="r_value.html" class="active-frame" title="計算工具"></iframe>
        </div>
    </div>

    <script>
        let currentUrl = 'r_value.html';

        function loadTool(url, element, title) {
            currentUrl = url;
            
            // 1. 替換頂部標題
            document.getElementById('current-title').innerText = title;
            
            // 2. 移除所有 iframe 的顯示狀態 (將它們隱藏至背景)
            let iframes = document.querySelectorAll('.iframe-container iframe');
            iframes.forEach(iframe => iframe.classList.remove('active-frame'));
            
            // 3. 檢查是不是已經有這個網頁的 iframe 了？
            // 將檔名轉換為 ID (例如 r_value.html -> frame-r_value)
            let frameId = 'frame-' + url.replace('.html', ''); 
            let targetFrame = document.getElementById(frameId);
            
            // 如果還沒載入過，就動態建立一個新的 iframe
            if (!targetFrame) {
                targetFrame = document.createElement('iframe');
                targetFrame.id = frameId;
                targetFrame.src = url;
                document.getElementById('iframe-container').appendChild(targetFrame);
            }
            
            // 4. 把我們要看的這個 iframe 顯示出來
            targetFrame.classList.add('active-frame');
            
            // 5. 更新左側選單的 Active (藍色高亮) 狀態
            let links = document.querySelectorAll('.menu a');
            links.forEach(link => link.classList.remove('active'));
            element.classList.add('active');
        }

        // 提供使用者在需要更大畫面時，於獨立分頁打開的功能
        function openInNewTab() {
            window.open(currentUrl, '_blank');
        }
    </script>
</body>
</html>
